# dnsmasq config for brvm0 — DHCP + DNS for Firecracker VMs

# Bind only to the VM bridge
interface=brvm0
bind-dynamic
except-interface=lo

# DHCP range for VMs
dhcp-range=192.168.137.2,192.168.137.254,255.255.255.0,12h
dhcp-option=3,192.168.137.1
dhcp-option=6,192.168.137.1

# Per-VM DHCP reservations (MAC → IP)
dhcp-hostsdir=/etc/boxcutter/dhcp-hosts

# DNS: resolve *.vm.lan to the bridge IP (where Caddy listens)
address=/vm.lan/192.168.137.1

# Upstream DNS for everything else
server=8.8.8.8
server=8.8.4.4
