name: Build and Push VM Images

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_override:
        description: 'Override image tag (defaults to git tag or SHA)'
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build ${{ matrix.vm_type }} image
    runs-on: [self-hosted, kvm]
    strategy:
      matrix:
        vm_type: [node, orchestrator]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag_override }}" ]; then
            echo "tag=${{ inputs.tag_override }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Set up bridge network
        run: sudo bash host/setup.sh

      - name: Build image
        run: sudo env PATH="/usr/local/go/bin:$PATH" bash host/build-image.sh ${{ matrix.vm_type }}
        timeout-minutes: 30

      - name: Push to OCI registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd host && go build -ldflags "-X main.version=${{ steps.tag.outputs.tag }}" -o boxcutter-host ./cmd/host/
          ./boxcutter-host build-image ${{ matrix.vm_type }} --push-only --tag ${{ steps.tag.outputs.tag }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.vm_type }}-image
          path: .images/${{ matrix.vm_type }}-image.qcow2.zst
          retention-days: 30

  release-host:
    name: Release host binary
    runs-on: [self-hosted, kvm]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Determine tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build release tarball
        run: make release-host VERSION=${{ steps.tag.outputs.tag }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.tag.outputs.tag }} \
            --generate-notes \
            .release/boxcutter-host-${{ steps.tag.outputs.tag }}-linux-amd64.tar.gz
