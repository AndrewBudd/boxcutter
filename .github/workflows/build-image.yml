name: Build and Push VM Images

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_override:
        description: 'Override image tag (defaults to git tag or SHA)'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.vm_type }} image
    runs-on: [self-hosted, kvm]
    strategy:
      matrix:
        vm_type: [node, orchestrator]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-system-x86_64 qemu-utils genisoimage zstd

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag_override }}" ]; then
            echo "tag=${{ inputs.tag_override }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Build image
        run: bash host/build-image.sh ${{ matrix.vm_type }}
        timeout-minutes: 30

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push to OCI registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd host && go build -o boxcutter-host ./cmd/host/
          ./boxcutter-host build-image ${{ matrix.vm_type }} --push --tag ${{ steps.tag.outputs.tag }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.vm_type }}-image
          path: .images/${{ matrix.vm_type }}-image.qcow2.zst
          retention-days: 30
