# Boxcutter MQTT broker — runs on host, listens on bridge IP only.
# No authentication needed: bridge network is trusted and isolated.

listener 1883 192.168.50.1
allow_anonymous true

# Persistence — survive broker restarts
persistence true
persistence_location /var/lib/mosquitto/

# Retained messages survive restarts
autosave_interval 60

# Reasonable limits
max_queued_messages 1000
message_size_limit 65536

# Logging
log_dest syslog
log_type error
log_type warning
